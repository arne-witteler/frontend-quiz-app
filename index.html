<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
    <link rel="stylesheet" href="./styles/styles.css">
    <title>Frontend Mentor | Frontend quiz app</title>
    <script src="./script.js" defer></script>
  </head>
  <body>
    <main class="quiz">

      <div class="quiz__top-bar">
        <div id="active-theme" class="quiz__active-theme" style="visibility: hidden;">
          <div id="active-theme-icon-wrapper" class="quiz__button-icon-wrapper">
            <img id="active-theme-icon" src="" alt="" class="quiz__button-icon">
          </div>
          <span id="active-theme-title" class="quiz__button-text">Hallo</span>
        </div>

        <div class="quiz__theme-toggle-container">
          <img id="sun-icon" src="./assets/images/icon-sun-dark.svg" alt="Sun icon" class="quiz__theme-toggle">
          <label class="quiz__switch">
            <input class="quiz__switch-input" type="checkbox" id="theme-switch">
            <span class="quiz__switch-slider"></span>
          </label>

          <img id="moon-icon" src="./assets/images/icon-moon-dark.svg" alt="Moon icon" class="quiz__theme-toggle">
        </div>
      </div>

      <div id="menu-screen" class="quiz__content">
        <div class="quiz__header">
          <h1 class="quiz__header-title">Welcome to the <span class="quiz__header-title-highlight">Frontend Quiz!</span></h1>
          <p class="quiz__header-subtitle">Pick a subject to get started.</p>
        </div>

        <div class="quiz__buttons-list">
          <button class="quiz__button">
            <div class="quiz__button-icon-wrapper quiz__button-icon-wrapper--html">
              <img src="./assets/images/icon-html.svg" alt="HTML icon" class="quiz__button-icon">

            </div>
            <p class="quiz__button-text">HTML</p>
          </button>
          <button class="quiz__button">
            <div class="quiz__button-icon-wrapper quiz__button-icon-wrapper--css">
              <img src="./assets/images/icon-css.svg" alt="CSS icon" class="quiz__button-icon">
            </div>
            <p class="quiz__button-text">CSS</p>
          </button>
          <button class="quiz__button">
            <div class="quiz__button-icon-wrapper quiz__button-icon-wrapper--js">
              <img src="./assets/images/icon-js.svg" alt="JavaScript icon" class="quiz__button-icon">
            </div>
            <p class="quiz__button-text">JavaScript</p>
          </button>
          <button class="quiz__button">
            <div class="quiz__button-icon-wrapper quiz__button-icon-wrapper--accessibility">
              <img src="./assets/images/icon-accessibility.svg" alt="Accessibility icon" class="quiz__button-icon">
            </div>
            <p class="quiz__button-text">Accessibility</p>
          </button>
        </div>
      </div>

      <div id="question-screen" class="quiz__question-container hidden">
        <div class="quiz__header">
          <p class="quiz__header-subtitle">Question <span id="current-question-num">1</span> of 10</p>
          <h2 id="question-text" class="quiz__question"></h2>

          <div class="progress-bar">
            <div id="progress-fill" class="progress-bar-fill"></div>
          </div>
        </div>

        <div class="quiz__buttons-container">

          <div class="quiz__buttons-list" id="options-container"></div>
          <button id="submit-answer" class="quiz__button quiz__button--submit">Submit Answer</button>

          <div class="quiz__error-container" style="visibility: hidden;">
            <img src="./assets/images/icon-error.svg" alt="Error icon" class="quiz__error-icon">
            <p id="error-message" class="quiz__error-message">Please select an answer!</p>
          </div>
        </div>
      </div>

      <div id="result-screen" class="quiz__result-screen hidden">

        <div class="quiz__header">
          <h1 class="quiz__header-title">Quiz completed <br>
            <span class="quiz__header-title-highlight">You scored...</span></h1>
        </div>

        <div class="quiz__result-content">

          <div class="quiz__result-card">

            <div class="quiz__result-topic">
              <div id="result-icon-wrapper" class="quiz__button-icon-wrapper">
                <img id="result-icon" src="" class="quiz__button-icon">
              </div>
              <p id="result-title" class="quiz__button-text"></p>
            </div>

            <div class="quiz__result-score">
              <span id="result-score">0</span>
              <p>out of <span id="result-total">10</span></p>
            </div>

          </div>

          <button id="restart-btn" class="quiz__button quiz__button--submit active">Play Again</button>

        </div>
      </div>

    </main>
  </body>
</html>
